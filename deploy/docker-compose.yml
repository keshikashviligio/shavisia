# Production stack for the DigitalOcean droplet — lives at /opt/shavisia/docker-compose.yml
# Secrets come from /opt/shavisia/.env (see docs/DEPLOY.md).
services:
  app:
    # replace OWNER with the GitHub owner/org (lowercase)
    image: ghcr.io/OWNER/shavisia:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://shavisia:${POSTGRES_PASSWORD}@db:5432/shavisia
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: shavisia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: shavisia
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shavisia"]
      interval: 5s
      timeout: 3s
      retries: 10

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
